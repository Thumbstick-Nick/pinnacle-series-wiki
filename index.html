<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinnacle Series Wiki — Internal Reference</title>
<style>
  :root {
    /* Brand palette inspired by Eagle Point Software / Pinnacle Series */
    --c-bg: #fafbfc;
    --c-content-bg: #ffffff;
    --c-text: #1a2332;
    --c-muted: #5b6b7a;
    --c-border: #e2e8f0;
    --c-sidebar-bg: #0f1f2c;
    --c-sidebar-text: #b8c4d1;
    --c-sidebar-text-active: #ffffff;
    --c-sidebar-hover: #1c3142;
    --c-accent: #1f6dc1;          /* Eagle Point blue */
    --c-accent-dark: #0e4d96;
    --c-accent-light: #e7f1fa;
    --c-link: #2d6b9e;
    --c-callout-bg: #f6f9fb;
    --c-callout-border: #d4dde5;
    --c-warn-bg: #fff8e1;
    --c-warn-border: #f0c75e;
    --c-perm-bg: #e7f1fa;
    --c-perm-border: #b4d2eb;
    --c-code-bg: #eef2f6;
    --sidebar-w: 280px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #0f1f2c;
    line-height: 1.6;
    font-size: 16.5px;
    background:
      linear-gradient(180deg, #f7faff 0%, #eff5fb 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--c-sidebar-bg);
    color: var(--c-sidebar-text);
    overflow-y: auto;
    border-right: 1px solid #0f1620;
    z-index: 100;
  }
  .sidebar-header {
    padding: 22px 22px 16px;
    border-bottom: 1px solid #1c3142;
  }
  .sidebar-header .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .sidebar-header .logo-mark {
    display: inline-block;
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    background:
      url("https://eaglepoint.com/wp-content/uploads/2024/06/logo-white.png") left center / 380% auto no-repeat;
  }
  .sidebar-header h1 {
    font-size: 16px;
    margin: 0;
    color: #fff;
    letter-spacing: 0.4px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .sidebar-header .by {
    font-size: 10.5px;
    color: var(--c-accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-left: 34px;
  }
  .sidebar-header .subtitle {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-top: 10px;
  }
  .sidebar-search {
    padding: 14px 18px 8px;
  }
  .sidebar-search input {
    width: 100%;
    padding: 7px 10px;
    background: #2d3a47;
    border: 1px solid #3d4d5d;
    color: #f1f5f9;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
  }
  .sidebar-search input::placeholder { color: #7c8a98; }
  .sidebar-search input:focus { border-color: var(--c-accent); }
  .sidebar nav { padding: 8px 0 40px; }
  .sidebar nav .group-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: #6b7a89;
    padding: 14px 22px 6px;
  }
  .sidebar nav a {
    display: block;
    padding: 6px 22px;
    color: var(--c-sidebar-text);
    text-decoration: none;
    font-size: 13.5px;
    border-left: 3px solid transparent;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }
  .sidebar nav a:hover {
    background: var(--c-sidebar-hover);
    color: var(--c-sidebar-text-active);
  }
  .sidebar nav a.active {
    background: var(--c-sidebar-hover);
    color: var(--c-sidebar-text-active);
    border-left-color: var(--c-accent);
    font-weight: 500;
  }

  /* Mobile burger */
  .menu-toggle {
    display: none;
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 200;
    background: var(--c-sidebar-bg);
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 18px;
  }

  /* Main content */
  main {
    margin-left: var(--sidebar-w);
    padding: 40px 56px 80px;
    max-width: 920px;
  }
  main h1 { font-size: 34px; margin: 0 0 8px; color: #0a1722; letter-spacing: -0.3px; font-weight: 700; }
  main h2 {
    font-size: 25px;
    margin: 42px 0 12px;
    padding-top: 18px;
    border-top: 1px solid var(--c-border);
    color: #0a1722;
    font-weight: 650;
  }
  main section:first-of-type h2 { border-top: none; padding-top: 0; }
  main h3 { font-size: 19px; margin: 24px 0 8px; color: #142231; font-weight: 600; }
  main h4 { font-size: 15px; margin: 18px 0 6px; color: #2d3a47; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  main p { margin: 0 0 14px; }
  main ul, main ol { margin: 0 0 14px; padding-left: 22px; }
  main li { margin-bottom: 4px; }
  main a { color: var(--c-link); text-decoration: none; border-bottom: 1px dotted var(--c-link); }
  main a:hover { border-bottom-style: solid; color: var(--c-accent-dark); border-bottom-color: var(--c-accent-dark); }
  main code {
    background: var(--c-code-bg);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0 20px;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--c-border);
    vertical-align: top;
  }
  th {
    background: #f4f7fa;
    font-weight: 600;
    color: #2d3a47;
    border-bottom: 2px solid var(--c-border);
  }
  tr:hover td { background: #fafbfc; }

  /* Callouts */
  .callout {
    background: var(--c-callout-bg);
    border-left: 4px solid var(--c-callout-border);
    padding: 12px 16px;
    margin: 14px 0;
    border-radius: 0 4px 4px 0;
    font-size: 14px;
  }
  .callout.warn {
    background: var(--c-warn-bg);
    border-left-color: var(--c-warn-border);
  }
  .callout.permissions {
    background: var(--c-perm-bg);
    border-left-color: var(--c-perm-border);
  }
  .callout strong { color: #0f1f2c; }
  .callout p:last-child { margin-bottom: 0; }

  /* "Where to find it" mini-card */
  .where {
    background: var(--c-accent-light);
    border: 1px solid #b4d2eb;
    border-radius: 6px;
    padding: 10px 14px;
    margin: 12px 0 18px;
    font-size: 14px;
  }
  .where .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--c-accent-dark);
    display: block;
    margin-bottom: 2px;
  }

  /* Hero illustration */
  .hero {
    margin: 6px 0 28px;
    border-radius: 10px;
    overflow: hidden;
    background: linear-gradient(180deg, #eaf2f9 0%, #f5e6e8 100%);
    box-shadow: 0 1px 3px rgba(15, 31, 44, 0.06);
  }
  .hero svg { display: block; width: 100%; height: auto; }

  /* Page header (in-content, separate from sidebar) */
  .content-card {
    background: var(--c-content-bg);
    border-radius: 10px;
    padding: 36px 44px;
    box-shadow: 0 1px 3px rgba(15, 31, 44, 0.06);
    border: 1px solid var(--c-border);
  }

  /* Section spacing */
  section { scroll-margin-top: 24px; padding-top: 4px; }

  /* Admin Portal badge inline with H2 */
  .ap-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--c-accent-dark);
    background: var(--c-accent-light);
    border: 1px solid #b4d2eb;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 10px;
    vertical-align: middle;
    position: relative;
    top: -3px;
  }

  /* Lead paragraph */
  .lead {
    font-size: 18px;
    color: #3a4d5c;
    margin-bottom: 22px;
    line-height: 1.5;
  }

  /* POC banner */
  .poc-banner {
    background: #fdf6e3;
    border: 1px solid #f0c75e;
    color: #6b4f00;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 13.5px;
    margin-bottom: 28px;
  }

  /* Footer */
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--c-border);
    color: var(--c-muted);
    font-size: 13px;
  }

  /* Responsive */
  @media (max-width: 960px) {
    .menu-toggle { display: block; }
    .sidebar {
      transform: translateX(-100%);
      transition: transform 0.2s ease;
    }
    .sidebar.open { transform: translateX(0); }
    main { margin-left: 0; padding: 60px 28px 60px; }
  }


  /* Screenshots */
  .screenshot {
    margin: 18px 0 22px;
    border: 1px solid var(--c-border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(15, 31, 44, 0.06);
    background: #fff;
  }
  .screenshot img {
    display: block;
    max-width: 100%;
    width: auto;
    height: auto;
    margin: 0 auto;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
  /* Container also gets a clean centering for narrow images */
  .screenshot {
    text-align: center;
  }
  .screenshot figcaption {
    text-align: left;
  }
  .screenshot figcaption {
    padding: 8px 14px;
    font-size: 13px;
    color: var(--c-muted);
    background: #f6f9fb;
    border-top: 1px solid var(--c-border);
  }
  @media print {
    .sidebar, .menu-toggle { display: none; }
    main { margin-left: 0; padding: 0; max-width: none; }
    section { page-break-inside: avoid; }
    .poc-banner, .mascot-launcher, .chatbot-panel, .lightbox, .brand-bar, .arch-layer { display: none !important; }
  }

  /* ============================================================
     ENHANCEMENTS: animations, mascot/chatbot, right-rail TOC,
     decorative dividers, scroll reveals, lightbox, hover lifts
     ============================================================ */

  @media (min-width: 1320px) {
    main { max-width: 1000px; padding-right: 32px; }
  }

  .brand-bar {
    position: fixed;
    top: 0; left: var(--sidebar-w); right: 0;
    height: 3px;
    background: linear-gradient(90deg, #1f6dc1, #0e4d96, #2d6b9e, #1f6dc1);
    background-size: 300% 100%;
    animation: gradientShift 12s ease infinite;
    z-index: 90;
  }
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @media (max-width: 960px) { .brand-bar { left: 0; } }

  .hero { position: relative; }
  .hero::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 30%, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0) 40%);
    pointer-events: none;
    animation: sunPulse 6s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 0.85; transform: scale(1.05); }
  }
  .hero svg { animation: heroFloat 14s ease-in-out infinite; }
  @keyframes heroFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }


  .sidebar nav a { position: relative; overflow: hidden; }
  .sidebar nav a::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--c-accent);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 0.25s ease;
  }
  .sidebar nav a:hover::before,
  .sidebar nav a.active::before { transform: scaleY(1); }
  .sidebar nav a:hover { transform: translateX(2px); }

  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: opacity, transform;
  }
  .reveal.in-view { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
    .hero svg, .hero::after, .brand-bar,
    .mascot-launcher { animation: none !important; }
  }

  main h2 { position: relative; }
  main h2::after {
    content: "";
    position: absolute;
    left: 0; bottom: -8px;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--c-accent) 0%, transparent 100%);
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  section.in-view h2::after { width: 64px; }

  .where, .callout, .screenshot {
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .where:hover, .callout:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(15, 31, 44, 0.08);
  }
  .screenshot { cursor: zoom-in; }
  .screenshot:hover {
    transform: translateY(-3px) scale(1.005);
    box-shadow: 0 10px 28px rgba(15, 31, 44, 0.12);
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(15, 31, 44, 0.85);
    display: none;
    align-items: center; justify-content: center;
    z-index: 9000;
    backdrop-filter: blur(6px);
    cursor: zoom-out;
    animation: fadeIn 0.2s ease;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 92vw; max-height: 92vh;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: zoomIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes zoomIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

  /* Mascot launcher */
  .mascot-launcher {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background:
      url("https://eaglepoint.com/wp-content/uploads/2024/06/logo-white.png") left center / 380% auto no-repeat,
      linear-gradient(135deg, #1f6dc1 0%, #0e4d96 100%);
    border: 3px solid #fff;
    box-shadow: 0 6px 24px rgba(31, 109, 193, 0.45), 0 2px 6px rgba(15,31,44,0.15);
    cursor: pointer;
    z-index: 8000;
    overflow: visible;
    animation: mascotBob 3.5s ease-in-out infinite;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .mascot-launcher:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 32px rgba(31, 109, 193, 0.6), 0 4px 10px rgba(15,31,44,0.2);
  }
  .mascot-launcher.hidden { transform: scale(0); opacity: 0; pointer-events: none; }
  @keyframes mascotBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  .mascot-launcher .talk-bubble {
    position: absolute;
    top: 4px; right: 88px;
    background: #fff;
    border: 1px solid var(--c-border);
    border-radius: 10px 10px 2px 10px;
    padding: 8px 12px;
    font-size: 12.5px;
    color: var(--c-text);
    box-shadow: 0 4px 12px rgba(15,31,44,0.1);
    white-space: nowrap;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .mascot-launcher .talk-bubble::after {
    content: "";
    position: absolute;
    right: -7px; bottom: 8px;
    width: 0; height: 0;
    border-left: 7px solid #fff;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
  }
  .mascot-launcher.greet .talk-bubble { opacity: 1; transform: translateX(0); }
  .mascot-launcher .pulse-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid #1f6dc1;
    animation: pulseRing 2.5s ease-out infinite;
    pointer-events: none;
  }
  @keyframes pulseRing {
    0%   { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  /* Chatbot panel */
  .chatbot-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 380px;
    max-width: calc(100vw - 32px);
    height: 560px;
    max-height: calc(100vh - 48px);
    background: #fff;
    border: 1px solid var(--c-border);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(15, 31, 44, 0.25);
    z-index: 8001;
    display: none;
    flex-direction: column;
    overflow: hidden;
    transform-origin: bottom right;
    animation: chatPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .chatbot-panel.open { display: flex; }
  @keyframes chatPop {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .chatbot-scene {
    height: 160px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .chatbot-scene svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .chatbot-scene .close-x {
    position: absolute;
    top: 10px; right: 10px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(15, 31, 44, 0.4);
    z-index: 3;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    z-index: 2;
  }
  .chatbot-scene .close-x:hover { background: rgba(15, 31, 44, 0.85); }
  .chatbot-header-text {
    padding: 12px 16px 14px;
    background: var(--c-sidebar-bg);
    color: #fff;
    font-size: 13.5px;
    flex-shrink: 0;
  }
  .chatbot-header-text strong { color: var(--c-accent); }
  .chatbot-header-text .sub { font-size: 11.5px; color: #94a3b8; margin-top: 2px; }
  .chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px 8px;
    background: #fafbfc;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-msg {
    max-width: 85%;
    padding: 9px 12px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.5;
    animation: msgIn 0.25s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .chat-msg.bot {
    background: #fff;
    border: 1px solid var(--c-border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .chat-msg.user {
    background: var(--c-accent);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .chat-msg .jump {
    display: inline-block;
    margin-top: 6px;
    padding: 3px 9px;
    background: var(--c-accent-light);
    color: var(--c-accent-dark);
    border: 1px solid #b4d2eb;
    border-radius: 12px;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .chat-msg .jump:hover { background: var(--c-accent); color: #fff; }
  .chat-msg .src-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--c-accent-dark);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .chat-typing {
    display: inline-flex;
    gap: 3px;
    padding: 9px 12px;
    background: #fff;
    border: 1px solid var(--c-border);
    border-radius: 14px;
    align-self: flex-start;
  }
  .chat-typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #94a3b8;
    animation: typingBlink 1.2s infinite;
  }
  .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
  .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBlink {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30%           { opacity: 1; transform: translateY(-3px); }
  }
  .chatbot-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 14px 8px;
    background: #fafbfc;
    border-top: 1px solid var(--c-border);
  }
  .chatbot-suggestions button {
    background: #fff;
    border: 1px solid var(--c-border);
    color: var(--c-text);
    border-radius: 14px;
    padding: 5px 11px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chatbot-suggestions button:hover {
    background: var(--c-accent-light);
    border-color: var(--c-accent);
    color: var(--c-accent-dark);
  }
  .chatbot-input {
    display: flex;
    gap: 8px;

  /* ============== Drifting architectural backgrounds ============== */
  .arch-layer {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .arch-shape {
    position: absolute;
    width: 720px;
    height: auto;
    opacity: 0;
    will-change: transform, opacity;
  }
  .arch-shape svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .arch-shape svg path,
  .arch-shape svg line,
  .arch-shape svg circle,
  .arch-shape svg rect,
  .arch-shape svg polyline,
  .arch-shape svg polygon {
    fill: none;
    stroke: #3a4d5c;
    stroke-width: 1.4;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
  }
  .arch-shape svg .filled {
    fill: #3a4d5c;
    stroke: none;
    opacity: 0.7;
  }
  @keyframes archDrift1 {
    0%   { transform: translate(-40vw, 8vh) rotate(-2deg); opacity: 0; }
    15%  { opacity: 0.13; }
    85%  { opacity: 0.13; }
    100% { transform: translate(120vw, 14vh) rotate(2deg); opacity: 0; }
  }
  @keyframes archDrift2 {
    0%   { transform: translate(115vw, 55vh) rotate(3deg); opacity: 0; }
    18%  { opacity: 0.12; }
    82%  { opacity: 0.12; }
    100% { transform: translate(-45vw, 48vh) rotate(-1deg); opacity: 0; }
  }
  @keyframes archDrift3 {
    0%   { transform: translate(-35vw, 70vh) rotate(1deg); opacity: 0; }
    20%  { opacity: 0.11; }
    80%  { opacity: 0.11; }
    100% { transform: translate(120vw, 60vh) rotate(-3deg); opacity: 0; }
  }
  @keyframes archDrift4 {
    0%   { transform: translate(110vw, 22vh) rotate(-1deg); opacity: 0; }
    18%  { opacity: 0.12; }
    82%  { opacity: 0.12; }
    100% { transform: translate(-40vw, 32vh) rotate(2deg); opacity: 0; }
  }
  @keyframes archDrift5 {
    0%   { transform: translate(-40vw, 38vh) rotate(2deg); opacity: 0; }
    18%  { opacity: 0.11; }
    82%  { opacity: 0.11; }
    100% { transform: translate(120vw, 28vh) rotate(-2deg); opacity: 0; }
  }
  @keyframes archDrift6 {
    0%   { transform: translate(115vw, 80vh) rotate(-2deg); opacity: 0; }
    20%  { opacity: 0.10; }
    80%  { opacity: 0.10; }
    100% { transform: translate(-45vw, 5vh) rotate(2deg); opacity: 0; }
  }
  .arch-shape.s1 { animation: archDrift1 145s linear infinite; }
  .arch-shape.s2 { animation: archDrift2 165s linear infinite; animation-delay: -45s; }
  .arch-shape.s3 { animation: archDrift3 185s linear infinite; animation-delay: -90s; }
  .arch-shape.s4 { animation: archDrift4 155s linear infinite; animation-delay: -65s; }
  .arch-shape.s5 { animation: archDrift5 175s linear infinite; animation-delay: -120s; }
  .arch-shape.s6 { animation: archDrift6 195s linear infinite; animation-delay: -150s; }
  .arch-shape.s7 {
    position: absolute;
    top: 42vh;
    left: 50vw;
    width: 760px;
    opacity: 0.30;
    animation: none;
    pointer-events: none;
  }
  @media (max-width: 1320px) {
    .arch-shape.s7 { left: auto; right: 0; top: 45vh; width: 620px; opacity: 0.26; }
  }
  @media (max-width: 960px) {
    .arch-shape.s7 { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .arch-shape { animation: none !important; opacity: 0.10 !important; }
    .arch-shape.s1 { transform: translate(15vw, 8vh); }
    .arch-shape.s2 { transform: translate(60vw, 22vh); }
    .arch-shape.s3 { transform: translate(20vw, 45vh); }
    .arch-shape.s4 { transform: translate(70vw, 55vh); }
    .arch-shape.s5 { transform: translate(35vw, 75vh); }
    .arch-shape.s6 { transform: translate(80vw, 80vh); }
    /* s7 motto is static; reduced-motion uses default static positioning */
  }
  @media (max-width: 960px) {
    .arch-shape { width: 480px; }
  }
  @media (max-width: 600px) {
    .arch-layer { display: none; }
  }

  /* ============== Pinnacle Series side-embed ============== */
  .embed-toggle {
    position: fixed;
    top: 16px;
    right: 22px;
    z-index: 92;
    background: linear-gradient(135deg, #3a8fd1 0%, #0e4d96 100%);
    color: #fff;
    border: none;
    padding: 11px 22px;
    border-radius: 26px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(31, 109, 193, 0.55), 0 2px 6px rgba(15,31,44,0.18);
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.2px;
    text-shadow: 0 1px 1px rgba(15,31,44,0.15);
  }
  .embed-toggle::before,
  .embed-toggle::after {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 30px;
    border: 2px solid #1f6dc1;
    animation: embedPulse 2.6s cubic-bezier(0.22, 0.61, 0.36, 1) infinite;
    pointer-events: none;
  }
  .embed-toggle::after { animation-delay: 1.3s; }
  @keyframes embedPulse {
    0%   { transform: scale(1);   opacity: 0.75; }
    100% { transform: scale(1.45); opacity: 0; }
  }
  .embed-toggle .arrow {
    display: inline-block;
    font-size: 15px;
    line-height: 1;
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .embed-toggle:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 12px 32px rgba(31, 109, 193, 0.7), 0 4px 10px rgba(15,31,44,0.22);
  }
  .embed-toggle:hover .arrow { transform: translateX(5px); }
  .embed-toggle:active { transform: translateY(0) scale(0.98); }
  body.embed-open .embed-toggle { display: none; }
  @media (max-width: 720px) { .embed-toggle { display: none; } }
  @media (prefers-reduced-motion: reduce) {
    .embed-toggle::before, .embed-toggle::after { animation: none !important; opacity: 0 !important; }
  }
