<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinnacle Series Wiki — Internal Reference</title>
<style>
  :root {
    /* Brand palette inspired by Eagle Point Software / Pinnacle Series */
    --c-bg: #fafbfc;
    --c-content-bg: #ffffff;
    --c-text: #1a2332;
    --c-muted: #5b6b7a;
    --c-border: #e2e8f0;
    --c-sidebar-bg: #0f1f2c;
    --c-sidebar-text: #b8c4d1;
    --c-sidebar-text-active: #ffffff;
    --c-sidebar-hover: #1c3142;
    --c-accent: #1f6dc1;          /* Eagle Point blue */
    --c-accent-dark: #0e4d96;
    --c-accent-light: #e7f1fa;
    --c-link: #2d6b9e;
    --c-callout-bg: #f6f9fb;
    --c-callout-border: #d4dde5;
    --c-warn-bg: #fff8e1;
    --c-warn-border: #f0c75e;
    --c-perm-bg: #e7f1fa;
    --c-perm-border: #b4d2eb;
    --c-code-bg: #eef2f6;
    --sidebar-w: 280px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #0f1f2c;
    line-height: 1.6;
    font-size: 16.5px;
    background:
      linear-gradient(180deg, #f7faff 0%, #eff5fb 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--c-sidebar-bg);
    color: var(--c-sidebar-text);
    overflow-y: auto;
    border-right: 1px solid #0f1620;
    z-index: 100;
  }
  .sidebar-header {
    padding: 22px 22px 16px;
    border-bottom: 1px solid #1c3142;
  }
  .sidebar-header .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .sidebar-header .logo-mark {
    display: inline-block;
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    background:
      url("https://eaglepoint.com/wp-content/uploads/2024/06/logo-white.png") left center / 380% auto no-repeat;
  }
  .sidebar-header h1 {
    font-size: 16px;
    margin: 0;
    color: #fff;
    letter-spacing: 0.4px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .sidebar-header .by {
    font-size: 10.5px;
    color: var(--c-accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-left: 34px;
  }
  .sidebar-header .subtitle {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-top: 10px;
  }
  .sidebar-search {
    padding: 14px 18px 8px;
  }
  .sidebar-search input {
    width: 100%;
    padding: 7px 10px;
    background: #2d3a47;
    border: 1px solid #3d4d5d;
    color: #f1f5f9;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
  }
  .sidebar-search input::placeholder { color: #7c8a98; }
  .sidebar-search input:focus { border-color: var(--c-accent); }
  .sidebar nav { padding: 8px 0 40px; }
  .sidebar nav .group-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: #6b7a89;
    padding: 14px 22px 6px;
  }
  .sidebar nav a {
    display: block;
    padding: 6px 22px;
    color: var(--c-sidebar-text);
    text-decoration: none;
    font-size: 13.5px;
    border-left: 3px solid transparent;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }
  .sidebar nav a:hover {
    background: var(--c-sidebar-hover);
    color: var(--c-sidebar-text-active);
  }
  .sidebar nav a.active {
    background: var(--c-sidebar-hover);
    color: var(--c-sidebar-text-active);
    border-left-color: var(--c-accent);
    font-weight: 500;
  }

  /* Mobile burger */
  .menu-toggle {
    display: none;
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 200;
    background: var(--c-sidebar-bg);
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 18px;
  }

  /* Main content */
  main {
    margin-left: var(--sidebar-w);
    padding: 40px 56px 80px;
    max-width: 920px;
  }
  main h1 { font-size: 34px; margin: 0 0 8px; color: #0a1722; letter-spacing: -0.3px; font-weight: 700; }
  main h2 {
    font-size: 25px;
    margin: 42px 0 12px;
    padding-top: 18px;
    border-top: 1px solid var(--c-border);
    color: #0a1722;
    font-weight: 650;
  }
  main section:first-of-type h2 { border-top: none; padding-top: 0; }
  main h3 { font-size: 19px; margin: 24px 0 8px; color: #142231; font-weight: 600; }
  main h4 { font-size: 15px; margin: 18px 0 6px; color: #2d3a47; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  main p { margin: 0 0 14px; }
  main ul, main ol { margin: 0 0 14px; padding-left: 22px; }
  main li { margin-bottom: 4px; }
  main a { color: var(--c-link); text-decoration: none; border-bottom: 1px dotted var(--c-link); }
  main a:hover { border-bottom-style: solid; color: var(--c-accent-dark); border-bottom-color: var(--c-accent-dark); }
  main code {
    background: var(--c-code-bg);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0 20px;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--c-border);
    vertical-align: top;
  }
  th {
    background: #f4f7fa;
    font-weight: 600;
    color: #2d3a47;
    border-bottom: 2px solid var(--c-border);
  }
  tr:hover td { background: #fafbfc; }

  /* Callouts */
  .callout {
    background: var(--c-callout-bg);
    border-left: 4px solid var(--c-callout-border);
    padding: 12px 16px;
    margin: 14px 0;
    border-radius: 0 4px 4px 0;
    font-size: 14px;
  }
  .callout.warn {
    background: var(--c-warn-bg);
    border-left-color: var(--c-warn-border);
  }
  .callout.permissions {
    background: var(--c-perm-bg);
    border-left-color: var(--c-perm-border);
  }
  .callout strong { color: #0f1f2c; }
  .callout p:last-child { margin-bottom: 0; }

  /* "Where to find it" mini-card */
  .where {
    background: var(--c-accent-light);
    border: 1px solid #b4d2eb;
    border-radius: 6px;
    padding: 10px 14px;
    margin: 12px 0 18px;
    font-size: 14px;
  }
  .where .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--c-accent-dark);
    display: block;
    margin-bottom: 2px;
  }

  /* Hero illustration */
  .hero {
    margin: 6px 0 28px;
    border-radius: 10px;
    overflow: hidden;
    background: linear-gradient(180deg, #eaf2f9 0%, #f5e6e8 100%);
    box-shadow: 0 1px 3px rgba(15, 31, 44, 0.06);
  }
  .hero svg { display: block; width: 100%; height: auto; }

  /* Page header (in-content, separate from sidebar) */
  .content-card {
    background: var(--c-content-bg);
    border-radius: 10px;
    padding: 36px 44px;
    box-shadow: 0 1px 3px rgba(15, 31, 44, 0.06);
    border: 1px solid var(--c-border);
  }

  /* Section spacing */
  section { scroll-margin-top: 24px; padding-top: 4px; }

  /* Admin Portal badge inline with H2 */
  .ap-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--c-accent-dark);
    background: var(--c-accent-light);
    border: 1px solid #b4d2eb;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 10px;
    vertical-align: middle;
    position: relative;
    top: -3px;
  }

  /* Lead paragraph */
  .lead {
    font-size: 18px;
    color: #3a4d5c;
    margin-bottom: 22px;
    line-height: 1.5;
  }

  /* POC banner */
  .poc-banner {
    background: #fdf6e3;
    border: 1px solid #f0c75e;
    color: #6b4f00;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 13.5px;
    margin-bottom: 28px;
  }

  /* Footer */
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--c-border);
    color: var(--c-muted);
    font-size: 13px;
  }

  /* Responsive */
  @media (max-width: 960px) {
    .menu-toggle { display: block; }
    .sidebar {
      transform: translateX(-100%);
      transition: transform 0.2s ease;
    }
    .sidebar.open { transform: translateX(0); }
    main { margin-left: 0; padding: 60px 28px 60px; }
  }


  /* Screenshots */
  .screenshot {
    margin: 18px 0 22px;
    border: 1px solid var(--c-border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(15, 31, 44, 0.06);
    background: #fff;
  }
  .screenshot img {
    display: block;
    max-width: 100%;
    width: auto;
    height: auto;
    margin: 0 auto;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
  /* Container also gets a clean centering for narrow images */
  .screenshot {
    text-align: center;
  }
  .screenshot figcaption {
    text-align: left;
  }
  .screenshot figcaption {
    padding: 8px 14px;
    font-size: 13px;
    color: var(--c-muted);
    background: #f6f9fb;
    border-top: 1px solid var(--c-border);
  }
  @media print {
    .sidebar, .menu-toggle { display: none; }
    main { margin-left: 0; padding: 0; max-width: none; }
    section { page-break-inside: avoid; }
    .poc-banner, .mascot-launcher, .chatbot-panel, .lightbox, .brand-bar, .arch-layer { display: none !important; }
  }
